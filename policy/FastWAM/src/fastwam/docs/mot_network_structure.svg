<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1420" viewBox="0 0 1900 1420" role="img" aria-labelledby="title desc">
  <title id="title">FastWAM MoT Detailed Network Structure</title>
  <desc id="desc">Detailed architecture diagram for FastWAM MoT. It shows video and action pre-DiT embeddings, time modulation injection, RoPE on q and k, mixed attention with joint masks, expert-specific transformer post blocks, dimensional changes, and the video key-value cache inference path.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .panel { fill: #ffffff; stroke: #c7d0df; stroke-width: 2; }
      .panel-soft { fill: #f2f6fc; stroke: #c7d0df; stroke-width: 2; }
      .video { fill: #e8f3ff; stroke: #3f76b5; stroke-width: 2; }
      .action { fill: #ecf7ee; stroke: #4b965d; stroke-width: 2; }
      .time { fill: #fff1f2; stroke: #be5b67; stroke-width: 2; }
      .rope { fill: #eef2ff; stroke: #6675c9; stroke-width: 2; }
      .mask { fill: #fff7ed; stroke: #c47a22; stroke-width: 2; }
      .mixed { fill: #fff4cf; stroke: #b7791f; stroke-width: 2; }
      .cache { fill: #f4eaff; stroke: #845ab5; stroke-width: 2; }
      .io { fill: #ffffff; stroke: #687383; stroke-width: 2; }
      .dim { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .note { fill: #fbfcff; stroke: #aab6c8; stroke-width: 1.5; stroke-dasharray: 8 6; }
      .text { font-family: Inter, Arial, sans-serif; fill: #182033; font-size: 20px; }
      .small { font-family: Inter, Arial, sans-serif; fill: #364152; font-size: 16px; }
      .tiny { font-family: Inter, Arial, sans-serif; fill: #4b5563; font-size: 14px; }
      .micro { font-family: Inter, Arial, sans-serif; fill: #52606d; font-size: 12px; }
      .title { font-family: Inter, Arial, sans-serif; fill: #111827; font-size: 34px; font-weight: 700; }
      .subtitle { font-family: Inter, Arial, sans-serif; fill: #4b5563; font-size: 18px; }
      .label { font-family: Inter, Arial, sans-serif; fill: #111827; font-size: 17px; font-weight: 700; }
      .label-sm { font-family: Inter, Arial, sans-serif; fill: #111827; font-size: 15px; font-weight: 700; }
      .code { font-family: "JetBrains Mono", Consolas, monospace; fill: #1f2937; font-size: 14px; }
      .code-sm { font-family: "JetBrains Mono", Consolas, monospace; fill: #334155; font-size: 12px; }
      .arrow { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead); }
      .arrow-soft { stroke: #64748b; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead-soft); }
      .arrow-video { stroke: #2563eb; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead-video); }
      .arrow-action { stroke: #16a34a; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead-action); }
      .arrow-time { stroke: #be123c; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead-time); }
      .arrow-rope { stroke: #4f46e5; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead-rope); }
      .arrow-mask { stroke: #c2410c; stroke-width: 2.2; fill: none; marker-end: url(#arrowhead-mask); }
      .arrow-cache { stroke: #7c3aed; stroke-width: 2.3; fill: none; marker-end: url(#arrowhead-cache); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
    <marker id="arrowhead-soft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b" />
    </marker>
    <marker id="arrowhead-video" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-action" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a34a" />
    </marker>
    <marker id="arrowhead-time" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#be123c" />
    </marker>
    <marker id="arrowhead-rope" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4f46e5" />
    </marker>
    <marker id="arrowhead-mask" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
