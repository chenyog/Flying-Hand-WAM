train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/flying_hand_lerobot/blocks_ranking_rgb
    - ./data/flying_hand_lerobot/blocks_ranking_size
    - ./data/flying_hand_lerobot/move_bottle
    - ./data/flying_hand_lerobot/move_can_pot
    - ./data/flying_hand_lerobot/place_can_basket
    - ./data/flying_hand_lerobot/place_fruit_skillet
    - ./data/flying_hand_lerobot/rotate_qrcode
    - ./data/flying_hand_lerobot/shake_bottle
    - ./data/flying_hand_lerobot/stack_blocks_two
    - ./data/flying_hand_lerobot/stack_blocks_two_size
  shape_meta:
    images:
      - key: wrist_camera
        raw_shape: [3, 480, 640]
        shape: [3, 256, 320]
    action:
      - key: default
        raw_shape: 5
        shape: 5
    state:
      - key: default
        raw_shape: 5
        shape: 5
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [256, 320]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  pretrained_norm_stats: ./data/flying_hand_lerobot/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: null
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 1
    action_output_dim: 5
    proprio_output_dim: 5
    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: z-score
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [256, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [256, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/flying_hand/all_tasks
  context_len: 128
