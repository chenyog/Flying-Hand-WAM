# @package _global_

defaults:
  - override /data: flying_hand
  - override /model: fastwam
  - _self_

batch_size: 8
num_workers: 8

model:
  mot_checkpoint_mixed_attn: true

lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 10
max_steps: null
log_every: 10
save_every: 500
eval_every: 100

gradient_accumulation_steps: 2
weight_decay: 1e-2
resume: null
